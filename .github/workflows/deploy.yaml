name: CI/CD for time-app deploy to ec2

on:
  push: 
    branches: ["main"]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: ["24.15.0"]

    runs-on: ${{matrix.os}}
    steps:
      - name: Cloning Repository
        uses: actions/checkout@v6
            
      - name: Install Node.js ${{matrix.node-version}}
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node-version}}

      - name: API Dependency Install
        working-directory: ./api
        run: npm install           

      - name: API unit test
        working-directory: ./api
        run: npm run test

      - name: Frontend Dependency Install
        working-directory: ./frontend
        run: npm install

  build-and-push:
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{matrix.os}}
    steps:
      - name: Cloning Repository
        uses: actions/checkout@v6
            
      - name: Docker login
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: API image build and push
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/ta_api ./api
          docker push ${{secrets.DOCKER_USERNAME}}/ta_api
            
      - name: Frontend image build and push
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/ta_front ./frontend
          docker push ${{secrets.DOCKER_USERNAME}}/ta_front
  
  aws-vm-deploy:
    needs: build-and-push
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{matrix.os}}

    steps:
      - name: AWS VM SSH connect and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.AWS_HOST}}
          username: ${{secrets.AWS_USERNAME}}
          key: ${{secrets.AWS_SSH_SECRET_KEY}}
          port: 22

          script: |
            if [ ! -d "time-app-deploy-FSDA_Oct_24_5_az/.git" ]; then
            git clone https://github.com/Zamanof/time-app-deploy-FSDA_Oct_24_5_az.git
            fi

            cd time-app-deploy-FSDA_Oct_24_5_az
            git pull origin main
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f
    
